name: Sync Telegram Channel

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch:        # manual trigger from Actions tab

permissions:
  contents: write           # push updated telegram.md
  pages: write              # deploy to GitHub Pages
  id-token: write           # required by deploy-pages action

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Telegram posts and regenerate page
        run: python scripts/sync_telegram.py

      - name: Commit if changed
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add telegram.md
          if git diff --staged --quiet; then
            echo "No changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: sync telegram channel posts"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # Re-deploy Pages when telegram.md changes (GITHUB_TOKEN push won't trigger gh-pages.yml)
  deploy:
    needs: sync
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # fetch the commit just pushed above

      - uses: actions/configure-pages@v5

      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
