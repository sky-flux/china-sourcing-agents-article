<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="canonical" href="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
  <style>
    :root {
      --bg: #fafafa;
      --fg: #1a1a1a;
      --muted: #666;
      --accent: #E26B1F;
      --border: #e5e5e5;
      --max-width: 720px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111;
        --fg: #eee;
        --muted: #999;
        --border: #333;
      }
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }
    header a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    header a:hover { text-decoration: underline; }
    h1, h2, h3 { line-height: 1.3; margin-top: 2rem; }
    h1 { font-size: 1.75rem; margin-top: 0; }
    h2 { font-size: 1.35rem; border-bottom: 1px solid var(--border); padding-bottom: 0.4rem; }
    h3 { font-size: 1.1rem; }
    a { color: var(--accent); }
    img { max-width: 100%; height: auto; border-radius: 6px; }
    pre, code {
      background: #f4f4f4;
      border-radius: 4px;
      font-family: "SF Mono", Monaco, Inconsolata, monospace;
      font-size: 0.9em;
    }
    pre { padding: 1rem; overflow-x: auto; }
    code { padding: 0.15em 0.4em; }
    pre code { padding: 0; background: none; }
    blockquote {
      border-left: 3px solid var(--accent);
      margin: 1.5rem 0;
      padding: 0.5rem 1rem;
      background: rgba(226,107,31,0.05);
      color: var(--muted);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
    }
    th, td { border: 1px solid var(--border); padding: 0.6rem 0.8rem; text-align: left; }
    th { background: rgba(0,0,0,0.03); font-weight: 600; }
    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.85rem;
    }
    .back { display: inline-block; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="{{ site.baseurl }}/">← {{ site.title }}</a>
    </header>
    <main>
      {{ content }}
    </main>
    <footer>
      <div style="display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1rem;">
        <a href="https://china-sourcing-agents.com/">Home</a>
        <a href="https://china-sourcing-agents.com/services/">Services</a>
        <a href="https://china-sourcing-agents.com/guides/">Guides</a>
        <a href="https://china-sourcing-agents.com/blog/">Blog</a>
        <a href="https://china-sourcing-agents.com/cases/">Cases</a>
        <a href="https://china-sourcing-agents.com/wiki/">Wiki</a>
        <a href="{{ site.baseurl }}/directory">Site Directory</a>
        <a href="{{ site.baseurl }}/telegram">Telegram Channel</a>
      </div>
      <p>© {{ site.time | date: "%Y" }} <a href="https://china-sourcing-agents.com">China Sourcing Agent</a>. Articles licensed under <a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a>.</p>
    </footer>
  </div>
</body>
</html>
