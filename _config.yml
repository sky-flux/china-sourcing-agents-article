title: "China Sourcing Agent Knowledge Base — Electronics & IoT Sourcing Guides"
description: "385+ articles on sourcing electronics, IoT hardware, smart home devices, and PCBs from China. Covers factory auditing, quality inspection, supplier matching, OEM/ODM manufacturing, and supply chain management. By China Sourcing Agent (china-sourcing-agents.com)."
baseurl: "/china-sourcing-agents-article"
url: "https://sky-flux.github.io"
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
plugins:
  - jekyll-relative-links
relative_links:
  enabled: true
  collections: true
include:
  - guides
  - blog
  - services
  - industries
  - cases
  - wiki
  - alternatives
  - products
  - cities
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
